<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0f1e">
  <title>ETF 투자 보고서</title>
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root{--bg:#0a0f1e;--bg2:#111827;--bg3:#1a2235;--border:rgba(99,179,237,0.12);--accent:#63b3ed;--accent2:#f6ad55;--accent3:#68d391;--red:#fc8181;--purple:#b794f4;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--mono:"JetBrains Mono",monospace;--sans:"Noto Sans KR",sans-serif}
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(99,179,237,.03)1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .page{display:none;position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 0 110px}
    .page.active{display:block}
    /* 헤더 */
    .header{padding:16px 20px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(10,15,30,.96);backdrop-filter:blur(20px);z-index:100}
    .header-top{display:flex;justify-content:space-between;align-items:center}
    .logo{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:3px}
    .live-badge{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--accent3);font-family:var(--mono)}
    .live-dot{width:6px;height:6px;background:var(--accent3);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
    .header-time{margin-top:6px;font-family:var(--mono);font-size:20px;font-weight:600;letter-spacing:-.5px}
    .header-date{font-size:11px;color:var(--text3);margin-top:2px}
    /* 공통 */
    .sec{padding:14px 20px}
    .sec-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:11px}
    .sec-lbl{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;font-family:var(--mono)}
    .divider{height:1px;background:var(--border);margin:2px 20px}
    /* ETF 카드 */
    .etf-row-main{background:var(--bg2);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden}
    .etf-top-row{display:flex;align-items:center;gap:8px;padding:10px 12px 6px}
    .etf-color-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .etf-name-col{font-size:12px;font-weight:500;flex:1}
    .etf-price-input{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:5px 7px;color:var(--accent);font-family:var(--mono);font-size:12px;font-weight:600;width:90px;text-align:right;outline:none}
    .etf-price-input:focus{border-color:var(--accent)}
    .etf-price-input::placeholder{color:var(--text3);font-weight:400}
    /* 현재가 요약 행 */
    .etf-price-summary{display:flex;justify-content:space-between;align-items:center;padding:0 12px 8px}
    /* 매매 타이밍 테이블 */
    .timing-table{width:100%;border-collapse:collapse;border-top:1px solid var(--border)}
    .timing-table th{font-size:9px;color:var(--text3);font-family:var(--mono);padding:5px 8px;text-align:center;font-weight:400;border-bottom:1px solid var(--border);background:var(--bg3)}
    .timing-table th:first-child{text-align:left}
    .timing-table td{font-size:10px;font-family:var(--mono);padding:6px 8px;text-align:center;border-bottom:1px solid rgba(99,179,237,.05)}
    .timing-table td:first-child{text-align:left;color:var(--text2)}
    .tc-buy{color:var(--accent3)} .tc-sell{color:var(--red)} .tc-neu{color:var(--text3)}
    .timing-reason-row{padding:6px 12px 8px;font-size:10px;color:var(--text2);line-height:1.5;border-top:1px solid rgba(99,179,237,.06)}
    .fetch-status{font-size:11px;font-family:var(--mono);color:var(--text3);min-height:14px;margin-bottom:6px}
    .fetch-status.ok{color:var(--accent3)} .fetch-status.err{color:var(--red)} .fetch-status.ing{color:var(--accent2)}
    /* 대시보드 */
    .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
    .dash-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px}
    .dash-lbl{font-size:10px;color:var(--text3);margin-bottom:5px}
    .dash-val{font-family:var(--mono);font-size:19px;font-weight:700}
    .dash-val.pos{color:var(--accent3)} .dash-val.neg{color:var(--red)} .dash-val.neu{color:var(--accent)}
    .dash-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}
    .etf-detail-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:5px}
    .wbar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .wbar-name{font-size:10px;color:var(--text2);width:86px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .wbar-bg{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
    .wbar-fill{height:100%;border-radius:3px;transition:width .6s}
    .wbar-pct{font-size:10px;font-family:var(--mono);color:var(--text3);width:34px;text-align:right}
    /* 업로드 */
    .upload-zone{background:var(--bg2);border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:border-color .2s}
    .upload-zone:active{border-color:var(--accent)}
    .upload-msg{font-size:11px;color:var(--accent3);font-family:var(--mono);margin-top:5px;min-height:14px}
    /* 거래 입력 */
    .trade-form{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:9px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .f-lbl{font-size:10px;color:var(--text3);display:block;margin-bottom:3px}
    .f-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px 9px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none}
    .f-input:focus{border-color:var(--accent)}
    .f-input option{background:var(--bg2)}
    .type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
    .type-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:7px;color:var(--text3);font-size:11px;font-family:var(--sans);cursor:pointer;text-align:center;transition:all .2s}
    .type-btn.buy.on{background:rgba(104,211,145,.15);border-color:var(--accent3);color:var(--accent3)}
    .type-btn.sell.on{background:rgba(252,129,129,.15);border-color:var(--red);color:var(--red)}
    .type-btn.hold.on{background:rgba(99,179,237,.15);border-color:var(--accent);color:var(--accent)}
    .btn-add{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans)}
    .trade-list{display:flex;flex-direction:column;gap:5px;margin-top:7px}
    .trade-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 11px;display:flex;justify-content:space-between;align-items:center}
    .t-badge{font-size:10px;padding:2px 6px;border-radius:4px;font-family:var(--mono);display:inline-block;margin-bottom:2px}
    .t-badge.buy{background:rgba(104,211,145,.15);color:var(--accent3)}
    .t-badge.sell{background:rgba(252,129,129,.15);color:var(--red)}
    .t-badge.hold{background:rgba(99,179,237,.15);color:var(--accent)}
    .btn-del{background:none;border:none;color:var(--text3);font-size:12px;cursor:pointer;padding:2px 5px}
    /* 시나리오 */
    .sc-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
    .sc-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 8px;text-align:center}
    .sc-lbl{font-size:10px;color:var(--text3);margin-bottom:4px}
    .sc-prob{font-family:var(--mono);font-size:20px;font-weight:700}
    .sc-prob.a{color:var(--accent3)} .sc-prob.b{color:var(--accent2)} .sc-prob.c{color:var(--red)}
    input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;outline:none;cursor:pointer;margin-top:6px}
    input[type=range].sa{background:var(--accent3)} input[type=range].sb{background:var(--accent2)} input[type=range].sc2{background:var(--red)}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--text);cursor:pointer}
    /* 보고서 */
    .rpt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .btn-rpt{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px 6px;color:var(--text);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .2s}
    .btn-rpt:active{transform:scale(.95);border-color:var(--accent);background:rgba(99,179,237,.08)}
    .load-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:32px 20px;text-align:center;display:none}
    .load-box.on{display:block}
    .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .err-box{background:rgba(252,129,129,.07);border:1px solid rgba(252,129,129,.2);border-radius:10px;padding:12px;font-size:12px;color:var(--red);display:none}
    .err-box.on{display:block}
    .rpt-sec{padding:14px 20px;display:none}
    .rpt-sec.on{display:block}
    .rpt-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
    .rpt-title{font-size:13px;font-weight:700;color:var(--accent)}
    .btn-act{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 9px;color:var(--text2);font-size:11px;cursor:pointer}
    .btn-act:active{background:var(--accent);color:var(--bg)}
    .rpt-box{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:13px;font-size:12.5px;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:60vh;overflow-y:auto}
    /* 히스토리 */
    .hist-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;cursor:pointer}
    .hist-item:active{border-color:var(--accent)}
    /* 모달 */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end}
    .modal-overlay.on{display:flex}
    .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:22px 20px 40px;width:100%;max-height:85vh;overflow-y:auto;animation:slideUp .3s ease}
    @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
    .set-lbl{font-size:10px;color:var(--text3);margin-bottom:5px;letter-spacing:.5px;text-transform:uppercase}
    .set-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:9px 11px;color:var(--text);font-family:var(--mono);font-size:12px;outline:none}
    .set-input:focus{border-color:var(--accent)}
    .ctx-btn{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 8px;color:var(--text3);font-size:11px;font-family:var(--sans);cursor:pointer;flex:1;text-align:center}
    .ctx-btn.on{background:rgba(99,179,237,.2);border-color:var(--accent);color:var(--accent);font-weight:600}
    .btn-save{width:100%;background:var(--accent);color:var(--bg);border:none;border-radius:9px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;font-family:var(--sans)}
    .btn-green{background:rgba(104,211,145,.1);border:1px solid rgba(104,211,145,.3);border-radius:7px;padding:6px 11px;color:var(--accent3);font-size:11px;font-weight:600;font-family:var(--sans);cursor:pointer}
    .btn-red{background:rgba(252,129,129,.07);border:1px solid rgba(252,129,129,.2);border-radius:7px;padding:6px 11px;color:var(--red);font-size:11px;font-weight:600;font-family:var(--sans);cursor:pointer}
    .empty-msg{text-align:center;color:var(--text3);font-size:12px;padding:30px}
    /* 하단 네비 */
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(10,15,30,.96);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:10px 0 22px;z-index:100}
    .nav-btn{flex:1;background:none;border:none;color:var(--text3);font-size:9px;font-family:var(--sans);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;transition:color .2s}
    .nav-btn.active{color:var(--accent)}
    .nav-ico{font-size:18px}
  </style>
</head>
<body>

<!-- ════════════════════════════════
     PAGE 1: 보고서
════════════════════════════════ -->
<div class="page active" id="page-report">
  <div class="header">
    <div class="header-top">
      <div class="logo">ETF · REPORT</div>
      <div class="live-badge"><div class="live-dot"></div><span id="mktStatus">로딩중</span></div>
    </div>
    <div class="header-time" id="clock">--:--:--</div>
    <div class="header-date" id="clockDate"></div>
  </div>

  <!-- ETF 현재가 + 매매 타이밍 -->
  <div class="sec">
    <div class="fetch-status" id="fetchStatus">종가 수집 중...</div>
    <div id="priceGrid"></div>
  </div>

  <div class="divider"></div>

  <!-- 이란 시나리오 -->
  <div class="sec">
    <div class="sec-lbl" style="margin-bottom:11px">🌐 이란 시나리오</div>
    <div class="sc-grid">
      <div class="sc-card"><div class="sc-lbl">A · 종전</div><div class="sc-prob a" id="probA">15%</div><input type="range" class="sa" id="slA" min="0" max="100" value="15"></div>
      <div class="sc-card"><div class="sc-lbl">B · 교착</div><div class="sc-prob b" id="probB">38%</div><input type="range" class="sb" id="slB" min="0" max="100" value="38"></div>
      <div class="sc-card"><div class="sc-lbl">C · 확전</div><div class="sc-prob c" id="probC">47%</div><input type="range" class="sc2" id="slC" min="0" max="100" value="47"></div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 보고서 생성 -->
  <div class="sec">
    <div class="sec-lbl" style="margin-bottom:11px">📋 보고서 생성</div>
    <div class="rpt-grid">
      <button class="btn-rpt" onclick="genReport('장전')"><span style="font-size:20px">🌅</span><span>장전</span></button>
      <button class="btn-rpt" onclick="genReport('장중')"><span style="font-size:20px">📈</span><span>장중</span></button>
      <button class="btn-rpt" onclick="genReport('마감')"><span style="font-size:20px">🌙</span><span>마감</span></button>
    </div>
  </div>

  <div class="sec" style="padding-top:0">
    <div class="load-box" id="loadBox"><div class="spinner"></div><div style="font-size:12px;color:var(--text3);font-family:var(--mono)">보고서 생성 중...</div><div style="font-size:11px;color:var(--accent);margin-top:5px" id="loadStep">Claude API 연결 중</div></div>
    <div class="err-box" id="errBox"></div>
  </div>

  <div class="rpt-sec" id="rptSec">
    <div class="rpt-head">
      <div class="rpt-title" id="rptTitle">보고서</div>
      <div style="display:flex;gap:6px">
        <button class="btn-act" onclick="copyRpt()">복사</button>
        <button class="btn-act" onclick="mailRpt()">📧</button>
      </div>
    </div>
    <div class="rpt-box" id="rptBox"></div>
  </div>
</div>

<!-- ════════════════════════════════
     PAGE 2: 포트폴리오
════════════════════════════════ -->
<div class="page" id="page-portfolio">
  <div class="header">
    <div class="header-top">
      <div class="logo">PORTFOLIO</div>
      <button class="btn-green" onclick="exportPortfolio()">📥 엑셀</button>
    </div>
    <div class="header-time" id="clock2">--:--:--</div>
    <div class="header-date" id="clockDate2" style="margin-top:2px"></div>
  </div>

  <div class="sec">
    <div class="sec-lbl" style="margin-bottom:11px">💰 투자 요약</div>
    <div class="dash-grid" id="dashGrid"></div>
  </div>

  <div class="divider"></div>

  <div class="sec">
    <div class="sec-lbl" style="margin-bottom:11px">📈 ETF별 손익</div>
    <div id="etfDetailRows"></div>
  </div>

  <div class="divider"></div>

  <div class="sec">
    <div class="sec-lbl" style="margin-bottom:11px">⚖️ 포트폴리오 비중</div>
    <div id="wbars"></div>
  </div>

  <div class="divider"></div>

  <div class="sec">
    <div class="sec-lbl" style="margin-bottom:11px">📂 거래내역 엑셀 업로드</div>
    <div class="upload-zone" onclick="document.getElementById('xlsxIn').click()">
      <div style="font-size:24px;margin-bottom:6px">📊</div>
      <div style="font-size:11px;color:var(--text3)">탭하여 엑셀 파일 선택<br><span style="color:var(--accent)">.xlsx / .xls 지원</span></div>
      <div class="upload-msg" id="uploadMsg"></div>
    </div>
    <input type="file" id="xlsxIn" accept=".xlsx,.xls" style="display:none" onchange="importXlsx(event)">
  </div>

  <div class="divider"></div>

  <div class="sec">
    <div class="sec-row">
      <div class="sec-lbl">📝 오늘 거래 입력</div>
      <button class="btn-green" onclick="exportTrades()">📥 엑셀저장</button>
    </div>
    <div class="trade-form">
      <div><label class="f-lbl">종목</label>
        <select class="f-input" id="tEtf">
          <option value="">선택</option>
          <option>KODEX 미국S&P500</option>
          <option>KODEX 미국나스닥100</option>
          <option>TIGER 반도체TOP10</option>
          <option>KODEX 방산TOP10</option>
          <option>ACE 코리아밸류업</option>
          <option>기타</option>
        </select>
      </div>
      <div><label class="f-lbl">매매구분</label>
        <div class="type-row">
          <button class="type-btn buy on" id="tb-buy" onclick="setType('buy')">🟢 매수</button>
          <button class="type-btn sell" id="tb-sell" onclick="setType('sell')">🔴 매도</button>
          <button class="type-btn hold" id="tb-hold" onclick="setType('hold')">🔵 관망</button>
        </div>
      </div>
      <div class="form-row">
        <div><label class="f-lbl">수량(주)</label><input class="f-input" type="number" id="tQty" placeholder="10"></div>
        <div><label class="f-lbl">단가(원)</label><input class="f-input" type="number" id="tPrice" placeholder="22000"></div>
      </div>
      <div class="form-row">
        <div><label class="f-lbl">날짜</label><input class="f-input" type="date" id="tDate"></div>
        <div><label class="f-lbl">메모</label><input class="f-input" type="text" id="tMemo" placeholder="선택"></div>
      </div>
      <button class="btn-add" onclick="addTrade()">+ 거래 추가</button>
    </div>
    <div class="trade-list" id="tradeList"></div>
  </div>
</div>

<!-- ════════════════════════════════
     PAGE 3: 히스토리
════════════════════════════════ -->
<div class="page" id="page-history">
  <div class="header">
    <div class="header-top">
      <div class="logo">HISTORY</div>

<script>
// ══════════════════════════════════════════
// 상수
// ══════════════════════════════════════════
const ETF_LIST = [
  { id:'sp500',   name:'KODEX 미국S&P500',   avg:22791, qty:45,   yCode:'379800.KS', color:'#63b3ed' },
  { id:'nasdaq',  name:'KODEX 미국나스닥100', avg:24373, qty:25,   yCode:'379810.KS', color:'#f6ad55' },
  { id:'semi',    name:'TIGER 반도체TOP10',   avg:30175, qty:5,    yCode:'396500.KS', color:'#68d391' },
  { id:'defense', name:'KODEX 방산TOP10',     avg:13326, qty:20,   yCode:'455890.KS', color:'#fc8181' },
  { id:'value',   name:'ACE 코리아밸류업',    avg:24938, qty:25,   yCode:'496120.KS', color:'#b794f4' },

  'https://corsproxy.io/?',

];

// ══════════════════════════════════════════
// 상태
// ══════════════════════════════════════════
let curReport = '';
let rptHist   = JSON.parse(localStorage.getItem('rptHist') || '[]');
let trades    = JSON.parse(localStorage.getItem('trades')  || '[]');
let tradeType = 'buy';
let prices    = {}; // { id: price }
// 매매 타이밍 캐시 (보고서에서 파싱 or 기본값)
let timings = {};

// ══════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  startClock();
  loadSett();
  setupSliders();
  setTodayDate();
  renderPriceGrid();   // 빈 카드 먼저 렌더링
  renderDashboard();

  renderHist();

});

// ══════════════════════════════════════════
// 시계
// ══════════════════════════════════════════
function startClock() {
  function tick() {
    const n = new Date();
    const t = n.toLocaleTimeString('ko-KR',{hour12:false});
    const d = n.toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
    ['clock','clock2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=t;});
    ['clockDate','clockDate2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=d;});
    const s=document.getElementById('mktStatus');
    if(s){s.textContent=isMarketOpen()?'장중':'장 마감';s.style.color=isMarketOpen()?'var(--accent3)':'var(--text3)';}
  }
  tick(); setInterval(tick,1000);
}
function isMarketOpen(){const n=new Date();const h=n.getHours(),m=n.getMinutes();return(h>9||(h===9&&m>=0))&&(h<15||(h===15&&m<=30));}

// ══════════════════════════════════════════
// 네비게이션
// ══════════════════════════════════════════
function goPage(name) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  window.scrollTo(0,0);
  if(name==='portfolio'){renderDashboard();renderTrades();}
  if(name==='history')renderHist();
}
function openSett(){document.getElementById('settModal').className='modal-overlay on';}
function closeSett(e){if(!e||e.target===document.getElementById('settModal'))document.getElementById('settModal').className='modal-overlay';}

// ══════════════════════════════════════════
// 종가 카드 렌더링 (타이밍 포함)
// ══════════════════════════════════════════
function renderPriceGrid() {
  document.getElementById('priceGrid').innerHTML = ETF_LIST.map(e => {
    const p = prices[e.id];
    const pct = (p && e.qty) ? ((p-e.avg)/e.avg*100).toFixed(1) : null;
    const pnlColor = pct!==null ? (pct>=0?'var(--accent3)':'var(--red)') : 'var(--text3)';
    const t = timings[e.id] || {};
    const hasTiming = t.buyPrice && t.buyPrice !== '--';
    return `
    <div class="etf-row-main">
      <div class="etf-top-row">
        <div class="etf-color-dot" style="background:${e.color}"></div>
        <div class="etf-name-col">${e.name}</div>
        <input class="etf-price-input" type="number" id="price_${e.id}"
          value="${p||''}" placeholder="직접입력"
          oninput="onPriceManual('${e.id}',${e.avg},${e.qty||0})">
      </div>
      <div class="etf-price-summary">
        <div style="font-size:10px;color:var(--text3);font-family:var(--mono)">평단 ${e.avg.toLocaleString()}${e.qty?' · '+e.qty+'주':''}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:${p?'var(--accent)':'var(--text3)'}">${p?p.toLocaleString()+'원':'수집중...'}</div>
          ${pct!==null?`<div style="font-family:var(--mono);font-size:12px;font-weight:600;color:${pnlColor}">${pct>=0?'+':''}${pct}%</div>`:''}
        </div>
      </div>
      ${hasTiming ? `
      <table class="timing-table">
        <tr>
          <th>구분</th><th>타이밍가</th><th>수량</th><th>금액</th>
        </tr>
        <tr>
          <td>🟢 매수</td>
          <td class="tc-buy">${t.buyPrice||'--'}</td>
          <td class="tc-buy">${t.buyQty||'--'}주</td>
          <td class="tc-buy">${t.buyAmt||'--'}</td>
        </tr>
        <tr>
          <td>🔴 매도</td>
          <td class="tc-sell">${t.sellPrice||'--'}</td>
          <td class="tc-sell">${t.sellQty||'--'}주</td>
          <td class="tc-sell">${t.sellAmt||'--'}</td>
        </tr>
      </table>
      ${t.reason?`<div class="timing-reason-row">💡 ${t.reason}</div>`:''}
      ` : `<div style="padding:6px 12px 8px;font-size:10px;color:var(--text3);font-family:var(--mono)">보고서 생성 후 매매 타이밍이 표시됩니다</div>`}
    </div>`;
  }).join('');
}

function onPriceManual(id, avg, qty) {
  const v = parseInt(document.getElementById('price_'+id).value);
  if(v>0) prices[id]=v;
  renderPriceGrid();
  renderDashboard();
}

// ══════════════════════════════════════════
// 자동 종가 수집
// ══════════════════════════════════════════
async function autoFetch() {
  setFS('ing', '⚡ 종가 수집 중...');
  let ok=0; const fail=[];
  for (const e of ETF_LIST) {
    try {
      const p = await fetchOne(e.yCode);
      if(p){ prices[e.id]=p; ok++; }
      else fail.push(e.name.split(' ').pop());
    } catch { fail.push(e.name.split(' ').pop()); }
    await new Promise(r=>setTimeout(r,300));
  }
  renderPriceGrid();
  renderDashboard();
  const t = new Date().toLocaleTimeString('ko-KR',{hour12:false,hour:'2-digit',minute:'2-digit'});
  if(ok===ETF_LIST.length) setFS('ok', `✅ 전체 수집 완료 ${t}${isMarketOpen()?' (장중 15분지연)':''}`);
  else if(ok>0) setFS('ok', `✅ ${ok}개 완료 / ❌ 실패: ${fail.join(', ')} — 수동 입력`);
  else setFS('err', '❌ 자동수집 실패 — 위 입력창에 직접 입력해주세요');
}

async function fetchOne(code) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${code}?interval=1d&range=1d`;
  for (const px of PROXIES) {
    try {
      const res = await fetch(px+encodeURIComponent(url),{headers:{'Accept':'application/json'}});
      if(!res.ok) continue;
      const d = await res.json();
      const meta = d?.chart?.result?.[0]?.meta;
      if(!meta) continue;
      const p = meta.regularMarketPrice||meta.previousClose;
      if(p&&p>0) return Math.round(p);
    } catch { continue; }
  }
  return null;
}
function setFS(cls,msg){const e=document.getElementById('fetchStatus');e.textContent=msg;e.className='fetch-status '+cls;}

// ══════════════════════════════════════════
// 포트폴리오 대시보드
// ══════════════════════════════════════════
function renderDashboard() {
  let cost=0,val=0,hasReal=false;
  ETF_LIST.forEach(e=>{
    if(!e.qty)return;
    cost+=e.avg*e.qty;
    const p=prices[e.id];
    if(p){val+=p*e.qty;hasReal=true;}else val+=e.avg*e.qty;
  });
  const pnl=val-cost, pct=cost>0?(pnl/cost*100).toFixed(2):0;
  const s=n=>(n>=0?'+':'')+n;
  document.getElementById('dashGrid').innerHTML=`
    <div class="dash-card"><div class="dash-lbl">총 투자원금</div><div class="dash-val neu">${Math.round(cost/10000).toLocaleString()}<span style="font-size:11px">만원</span></div><div class="dash-sub">${cost.toLocaleString()}원</div></div>
    <div class="dash-card"><div class="dash-lbl">현재 평가금액</div><div class="dash-val ${hasReal?(pnl>=0?'pos':'neg'):'neu'}">${Math.round(val/10000).toLocaleString()}<span style="font-size:11px">만원</span></div><div class="dash-sub">${val.toLocaleString()}원</div></div>
    <div class="dash-card"><div class="dash-lbl">평가 손익</div><div class="dash-val ${pnl>=0?'pos':'neg'}">${s(Math.round(pnl/10000))}<span style="font-size:11px">만원</span></div><div class="dash-sub">${s(Math.round(pnl))}원</div></div>
    <div class="dash-card"><div class="dash-lbl">총 수익률</div><div class="dash-val ${pnl>=0?'pos':'neg'}">${s(pct)}<span style="font-size:14px">%</span></div><div class="dash-sub">${hasReal?'실시간 반영':'종가 미입력'}</div></div>`;

  document.getElementById('etfDetailRows').innerHTML=ETF_LIST.filter(e=>e.qty).map(e=>{
    const p=prices[e.id]||e.avg,ep=(p-e.avg)*e.qty,epct=((p-e.avg)/e.avg*100).toFixed(1);
    return `<div class="etf-detail-row">
      <div><div style="font-size:11px;font-weight:500">${e.name}</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px">${e.qty}주 · 평단 ${e.avg.toLocaleString()} · ${prices[e.id]?'현재 '+p.toLocaleString():'종가미입력'}</div></div>
      <div style="text-align:right"><div style="font-family:var(--mono);font-size:13px;font-weight:600;color:${ep>=0?'var(--accent3)':'var(--red)'}">${ep>=0?'+':''}<b>${epct}</b>%</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${ep>=0?'+':''}<b>${Math.round(ep).toLocaleString()}</b>원</div></div>
    </div>`;
  }).join('');

  const items=ETF_LIST.filter(e=>e.qty).map(e=>({name:e.name.replace(/KODEX |TIGER |ACE /g,''),val:(prices[e.id]||e.avg)*e.qty,color:e.color}));
  const tot=items.reduce((s,i)=>s+i.val,0);
  document.getElementById('wbars').innerHTML=items.map(i=>`<div class="wbar-row"><div class="wbar-name">${i.name}</div><div class="wbar-bg"><div class="wbar-fill" style="width:${(i.val/tot*100).toFixed(1)}%;background:${i.color}"></div></div><div class="wbar-pct">${(i.val/tot*100).toFixed(1)}%</div></div>`).join('');
}

function getPrices(){return {...prices};}

// ══════════════════════════════════════════
// 엑셀 업로드
// ══════════════════════════════════════════
function importXlsx(ev) {
  const f=ev.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{raw:false});
      const tm={'매수':'buy','매도':'sell','관망':'hold','buy':'buy','sell':'sell','hold':'hold'};
      const imp=rows.map(row=>{
        const rawType=row['매매구분']||row['구분']||row['type']||'매수';
        const type=tm[String(rawType).trim()]||'buy';
        let rawDate=row['구매일']||row['날짜']||row['date']||'';
        let date=String(rawDate).slice(0,10)||new Date().toISOString().slice(0,10);
        return{
          id:Date.now()+Math.random(),
          etf:String(row['종목명']||row['종목']||row['ETF']||'').trim(),
          type,
          qty:Math.abs(parseInt(row['매매수량']||row['수량']||row['qty']||0)),
          price:parseInt(row['매매단가']||row['단가']||row['price']||0),
          date,memo:row['메모']||row['memo']||''
        };
      }).filter(r=>r.etf!=='');
      trades=[...imp,...trades];
      localStorage.setItem('trades',JSON.stringify(trades));
      renderTrades();
      document.getElementById('uploadMsg').textContent=`✅ ${imp.length}건 가져오기 완료`;
    }catch(err){document.getElementById('uploadMsg').textContent='❌ 파일 읽기 오류: '+err.message;}
  };
  r.readAsBinaryString(f);ev.target.value='';
}

// ══════════════════════════════════════════
function setTodayDate(){const el=document.getElementById('tDate');if(el)el.value=new Date().toISOString().slice(0,10);}
function setType(t){
  tradeType=t;
  ['buy','sell','hold'].forEach(x=>{document.getElementById('tb-'+x).className='type-btn '+x+(x===t?' on':'');});
}
function addTrade(){
  const etf=document.getElementById('tEtf').value;
  const qty=parseInt(document.getElementById('tQty').value);
  const price=parseInt(document.getElementById('tPrice').value);
  const date=document.getElementById('tDate').value;
  const memo=document.getElementById('tMemo').value;
  if(!etf){alert('종목을 선택해주세요');return;}
  if(!qty||qty<1){alert('수량을 입력해주세요');return;}
  if(!price||price<1){alert('단가를 입력해주세요');return;}
  trades.unshift({id:Date.now(),etf,type:tradeType,qty,price,date,memo});
  localStorage.setItem('trades',JSON.stringify(trades));
  renderTrades();
  document.getElementById('tQty').value='';
  document.getElementById('tPrice').value='';
  document.getElementById('tMemo').value='';
}
function delTrade(id){trades=trades.filter(t=>t.id!==id);localStorage.setItem('trades',JSON.stringify(trades));renderTrades();}
function renderTrades(){
  const el=document.getElementById('tradeList');if(!el)return;
  const today=new Date().toISOString().slice(0,10);
  const td=trades.filter(t=>t.date===today);
  const lbl={buy:'매수',sell:'매도',hold:'관망'};
  if(!td.length){el.innerHTML='<div class="empty-msg">오늘 거래내역 없음</div>';return;}
  el.innerHTML=td.map(t=>`<div class="trade-item"><div><div style="font-size:12px;font-weight:500">${t.etf}</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:1px">${t.date}${t.memo?' · '+t.memo:''}</div></div><div style="display:flex;align-items:center;gap:7px"><div><span class="t-badge ${t.type}">${lbl[t.type]||t.type}</span><div style="font-family:var(--mono);font-size:10px;color:var(--text2);text-align:right">${t.qty}주 @${t.price.toLocaleString()}<br>${(t.qty*t.price).toLocaleString()}원</div></div><button class="btn-del" onclick="delTrade(${t.id})">✕</button></div></div>`).join('');
}
function exportPortfolio(){
  const data=ETF_LIST.filter(e=>e.qty).map(e=>{
    const p=prices[e.id]||e.avg;
    return{ETF:e.name,보유수량:e.qty,평균단가:e.avg,현재가:p,
           투자원금:e.avg*e.qty,평가금액:p*e.qty,
           평가손익:(p-e.avg)*e.qty,
           수익률:((p-e.avg)/e.avg*100).toFixed(2)+'%'};
  });
  const ws=XLSX.utils.json_to_sheet(data);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'포트폴리오');
  XLSX.writeFile(wb,`포트폴리오_${new Date().toISOString().slice(0,10)}.xlsx`);
}
function exportTrades(){
  if(!trades.length){alert('거래내역이 없습니다');return;}
  const data=trades.map(t=>({날짜:t.date,종목:t.etf,구분:t.type==='buy'?'매수':t.type==='sell'?'매도':'관망',수량:t.qty,단가:t.price,거래금액:t.qty*t.price,메모:t.memo||''}));
  const ws=XLSX.utils.json_to_sheet(data);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'거래내역');XLSX.writeFile(wb,`ETF거래내역_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ══════════════════════════════════════════
// 보고서 생성
// ══════════════════════════════════════════
async function genReport(type){
  const apiKey=localStorage.getItem('claudeApiKey');
  if(!apiKey){showErr('API Key를 설정(⚙️)에서 입력해주세요');return;}
  const sc=getSC(),now=new Date().toLocaleString('ko-KR');
  const priceTxt=ETF_LIST.map(e=>{
    const p=prices[e.id];
    const pct=p?` (${p>e.avg?'+':''}${((p-e.avg)/e.avg*100).toFixed(1)}%)`:''
    return `- ${e.name}: ${p?p.toLocaleString()+'원'+pct:'미입력'} / 평단 ${e.avg.toLocaleString()}원${e.qty?' / '+e.qty+'주':''}`;
  }).join('\n');
  const today=new Date().toISOString().slice(0,10);
  const todayT=trades.filter(t=>t.date===today);
  const tradeTxt=todayT.length?'\n\n[오늘 거래내역]\n'+todayT.map(t=>`- ${t.etf} ${t.type==='buy'?'매수':t.type==='sell'?'매도':'관망'} ${t.qty}주 @${t.price.toLocaleString()}원`).join('\n'):'';

  showLoad(true);hideRpt();hideErr();
  try{
    setStep('이전 보고서 컨텍스트 구성 중...');
    const cnt=parseInt(localStorage.getItem('contextCount')||'2');
    const prev=rptHist.slice(0,cnt).reverse();
    const msgs=[];
    if(prev.length>0){
      msgs.push({role:'user',content:'[이전 보고서 컨텍스트]\n\n'+prev.map((r,i)=>`--- ${i+1}번째 이전 (${r.time}/${r.type}) ---\n${r.content.slice(0,2000)}${r.content.length>2000?'\n...(생략)':''}`).join('\n\n')});
      msgs.push({role:'assistant',content:'이전 보고서를 확인했습니다. 예측 적중 여부, 시나리오 변화, 모의투자 연속성을 유지하며 작성하겠습니다.'});
    }
    msgs.push({role:'user',content:buildPrompt(type,priceTxt+tradeTxt,sc,now)});

    setStep('보고서 생성 중...');
    const res=await fetch('/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:msgs})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    curReport=data.content[0].text;

    // 보고서에서 매매 타이밍 파싱 시도
    parseTimings(curReport);

    rptHist.unshift({type,time:now,content:curReport});
    if(rptHist.length>20)rptHist.pop();
    localStorage.setItem('rptHist',JSON.stringify(rptHist));
    showLoad(false);showRpt(type,curReport);
  }catch(err){showLoad(false);showErr('오류: '+err.message);}
}

function buildPrompt(type,priceTxt,sc,now){
  const base=`당신은 한국 ETF 장기가치투자 전문 분석가입니다. 현재시각: ${now}

[보유 ETF 현황]
${priceTxt}

[매매 철학]
- S&P500·나스닥100·코리아밸류업: 차익실현 금지, 장기홀딩+저점추가매수
- 반도체: 업황 사이클 고점에서만 일부 차익실현
- 방산: 코어70%홀딩/위성30%트레이딩
- 모든 단가는 위 현재가 기준으로 재계산하여 수치 명시

[이란 시나리오] A(종전):${sc.a}% / B(교착):${sc.b}% / C(확전):${sc.c}%`;

  const tmpl={
    '장전':base+`\n\n개장 전 브리핑 작성:
①미 증시 3대지수 ②필라델피아반도체 ③원달러환율 ④이란A/B/C업데이트 ⑤오늘 경제지표
⑥ETF 매매 타이밍 테이블 — 반드시 아래 형식으로 작성:
[매매타이밍]
종목|현재가|1차매수가|매수수량|매수금액|1차매도가|매도수량|매도금액|근거요약
KODEX 미국S&P500|23,000|22,500|5|112,500|24,000|3|72,000|이평선 지지 확인
(5개 ETF 모두 작성)
[/매매타이밍]
⑦모의투자A(보유50만원)·B(비보유50만원) ⑧타임스케줄`,
    '장중':base+`\n\n장중 보고서 작성:
①코스피/코스닥 현황 ②외국인·기관 수급 ③이란전황·확률재조정
④ETF 매매 타이밍 테이블:
[매매타이밍]
종목|현재가|1차매수가|매수수량|매수금액|1차매도가|매도수량|매도금액|근거요약
(5개 ETF 모두 작성)
[/매매타이밍]
⑤모의투자손익 ⑥오후대응 ⑦핵심메시지`,
    '마감':base+`\n\n마감 보고서 작성:
①당일성과 ②주도섹터 ③이란최종
④ETF 매매 타이밍 테이블 (내일 기준):
[매매타이밍]
종목|현재가|1차매수가|매수수량|매수금액|1차매도가|매도수량|매도금액|근거요약
(5개 ETF 모두 작성)
[/매매타이밍]
⑤모의투자결산 ⑥공시스캔 ⑦예측정확도`,
  };
  return tmpl[type]||tmpl['장중'];
}

// 보고서에서 매매 타이밍 파싱
function parseTimings(text) {
  try {
    const m = text.match(/\[매매타이밍\]([\s\S]*?)\[\/매매타이밍\]/);
    if(!m) return;
    const lines = m[1].trim().split('\n').filter(l=>l.includes('|'));
    lines.forEach(line => {
      const cols = line.split('|').map(s=>s.trim());
      if(cols.length < 9) return;
      const etfName = cols[0];
      const etf = ETF_LIST.find(e => etfName.includes(e.name.split(' ').pop()) || e.name.includes(etfName));
      if(!etf) return;
      timings[etf.id] = {
        buyPrice:  cols[2] || '--',
        buyQty:    cols[3] || '',
        buyAmt:    cols[4] ? cols[4]+'원' : '',
        sellPrice: cols[5] || '--',
        sellQty:   cols[6] || '',
        sellAmt:   cols[7] ? cols[7]+'원' : '',
        reason:    cols[8] || ''
      };
    });
    renderPriceGrid();
  } catch(e) { /* 파싱 실패 시 무시 */ }
}

// ══════════════════════════════════════════
// 히스토리
// ══════════════════════════════════════════
function renderHist(){
  const el=document.getElementById('histList');if(!el)return;
  if(!rptHist.length){el.innerHTML='<div class="empty-msg">저장된 보고서 없음</div>';return;}
  const ic={'장전':'🌅','장중':'📈','마감':'🌙'};
  el.innerHTML=rptHist.map((r,i)=>`<div class="hist-item" onclick="loadHist(${i})"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:13px;font-weight:600">${ic[r.type]||'📋'} ${r.type} 보고서</div><div style="font-size:10px;color:var(--text3);font-family:var(--mono)">${r.time}</div></div><div style="font-size:11px;color:var(--text3);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.content.slice(0,70)}...</div></div>`).join('');
}
function loadHist(i){goPage('report');curReport=rptHist[i].content;showRpt(rptHist[i].type,curReport);parseTimings(curReport);}
function clearHist(){if(!confirm('전체 삭제하시겠습니까?'))return;rptHist=[];localStorage.setItem('rptHist','[]');renderHist();}

// ══════════════════════════════════════════
// UI 헬퍼
// ══════════════════════════════════════════
function showLoad(on){document.getElementById('loadBox').className='load-box'+(on?' on':'');}
function setStep(m){document.getElementById('loadStep').textContent=m;}
function showRpt(type,txt){const ic={'장전':'🌅','장중':'📈','마감':'🌙'};document.getElementById('rptTitle').textContent=(ic[type]||'📋')+' '+type+' 보고서';document.getElementById('rptBox').textContent=txt;document.getElementById('rptSec').className='rpt-sec on';document.getElementById('rptSec').scrollIntoView({behavior:'smooth'});}
function hideRpt(){document.getElementById('rptSec').className='rpt-sec';}
function showErr(m){const e=document.getElementById('errBox');e.textContent=m;e.className='err-box on';}
function hideErr(){document.getElementById('errBox').className='err-box';}
function copyRpt(){navigator.clipboard.writeText(curReport).then(()=>alert('복사됐습니다'));}
function mailRpt(){const g=localStorage.getItem('gmailAddress');if(!g){alert('설정에서 Gmail 입력해주세요');return;}const s=encodeURIComponent(document.getElementById('rptTitle').textContent);const b=encodeURIComponent(curReport.slice(0,2000));window.open(`mailto:${g}?subject=${s}&body=${b}`);}

// 설정
function loadSett(){document.getElementById('inKey').value=localStorage.getItem('claudeApiKey')||'';document.getElementById('inGmail').value=localStorage.getItem('gmailAddress')||'';const cnt=parseInt(localStorage.getItem('contextCount')||'2');setCtx(cnt);}
function saveSett(){localStorage.setItem('claudeApiKey',document.getElementById('inKey').value.trim());localStorage.setItem('gmailAddress',document.getElementById('inGmail').value.trim());closeSett();alert('저장됐습니다');}
function setCtx(n){[0,1,2,3].forEach(i=>{const b=document.getElementById('ctx'+i);if(b)b.className='ctx-btn'+(i===n?' on':'');});localStorage.setItem('contextCount',n);}
</script>
