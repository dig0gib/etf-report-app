<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ETF 보고서">
  <meta name="theme-color" content="#0a0f1e">
  <title>ETF 투자 보고서</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0f1e;
      --bg2: #111827;
      --bg3: #1a2235;
      --border: rgba(99,179,237,0.12);
      --accent: #63b3ed;
      --accent2: #f6ad55;
      --accent3: #68d391;
      --red: #fc8181;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Noto Sans KR', sans-serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 그리드 효과 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

    /* 헤더 */
    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10,15,30,0.95);
      backdrop-filter: blur(20px);
      z-index: 100;
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; }
    .logo {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    .live-badge {
      display: flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--accent3);
      font-family: var(--mono);
    }
    .live-dot {
      width: 6px; height: 6px;
      background: var(--accent3);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .header-time {
      margin-top: 8px;
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.5px;
    }
    .header-date { font-size: 11px; color: var(--text3); margin-top: 2px; letter-spacing: 1px; }

    /* ETF 종가 입력 섹션 */
    .section { padding: 16px 20px; }
    .section-label {
      font-size: 10px;
      color: var(--text3);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: var(--mono);
      margin-bottom: 12px;
    }

    /* 종가 카드 그리드 */
    .price-grid { display: flex; flex-direction: column; gap: 8px; }
    .price-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .price-card:focus-within { border-color: var(--accent); }
    .price-card-left { flex: 1; min-width: 0; }
    .price-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .price-avg { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
    .price-input-wrap { display: flex; align-items: center; gap: 4px; }
    .price-input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 600;
      width: 100px;
      text-align: right;
      outline: none;
      transition: border-color 0.2s;
    }
    .price-input:focus { border-color: var(--accent); }
    .price-input::placeholder { color: var(--text3); font-weight: 400; }
    .price-unit { font-size: 10px; color: var(--text3); }

    /* 수익률 뱃지 */
    .pnl-badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      min-width: 54px;
      text-align: center;
      display: none;
    }
    .pnl-badge.pos { background: rgba(104,211,145,0.12); color: var(--accent3); display: block; }
    .pnl-badge.neg { background: rgba(252,129,129,0.12); color: var(--red); display: block; }

    /* 보고서 버튼 */
    .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 20px; }
    .btn-report {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .btn-report:active { transform: scale(0.96); }
    .btn-report.morning:hover, .btn-report.morning:active { background: rgba(99,179,237,0.1); border-color: var(--accent); color: var(--accent); }
    .btn-report.midday:hover, .btn-report.midday:active { background: rgba(246,173,85,0.1); border-color: var(--accent2); color: var(--accent2); }
    .btn-report.closing:hover, .btn-report.closing:active { background: rgba(104,211,145,0.1); border-color: var(--accent3); color: var(--accent3); }
    .btn-icon { font-size: 20px; }

    /* 이란 시나리오 */
    .scenario-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .scenario-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
    }
    .scenario-label { font-size: 10px; color: var(--text3); margin-bottom: 6px; }
    .scenario-prob {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 600;
    }
    .scenario-prob.a { color: var(--accent3); }
    .scenario-prob.b { color: var(--accent2); }
    .scenario-prob.c { color: var(--red); }
    .scenario-name { font-size: 10px; margin-top: 4px; }

    /* 시나리오 슬라이더 */
    .scenario-slider { width: 100%; margin-top: 6px; }
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type=range].a { background: var(--accent3); }
    input[type=range].b { background: var(--accent2); }
    input[type=range].c { background: var(--red); }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }

    /* 보고서 출력 영역 */
    .report-section { padding: 16px 20px; display: none; }
    .report-section.visible { display: block; }
    .report-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .report-title { font-size: 13px; font-weight: 700; color: var(--accent); }
    .report-actions { display: flex; gap: 8px; }
    .btn-action {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text2);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-action:active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    .report-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      font-size: 12.5px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 60vh;
      overflow-y: auto;
    }

    /* 로딩 */
    .loading-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      display: none;
    }
    .loading-box.visible { display: block; }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 12px; color: var(--text3); font-family: var(--mono); }
    .loading-step { font-size: 11px; color: var(--accent); margin-top: 6px; }

    /* 에러 */
    .error-box {
      background: rgba(252,129,129,0.08);
      border: 1px solid rgba(252,129,129,0.2);
      border-radius: 10px;
      padding: 14px;
      font-size: 12px;
      color: var(--red);
      display: none;
    }
    .error-box.visible { display: block; }

    /* 설정 모달 */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: none;
      align-items: flex-end;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title { font-size: 14px; font-weight: 700; margin-bottom: 20px; }
    .setting-row { margin-bottom: 16px; }
    .setting-label { font-size: 11px; color: var(--text3); margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
    .setting-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      outline: none;
    }
    .setting-input:focus { border-color: var(--accent); }
    .btn-save {
      width: 100%;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      font-family: var(--sans);
    }

    /* 하단 네비 */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: rgba(10,15,30,0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 10px 0 20px;
      z-index: 100;
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text3);
      font-size: 9px;
      font-family: var(--sans);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      transition: color 0.2s;
    }
    .nav-btn.active { color: var(--accent); }
    .nav-icon { font-size: 18px; }

    /* 자동수집 버튼 */
    .section-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-label-row .section-label { margin-bottom: 0; }
    .btn-auto-fetch {
      background: linear-gradient(135deg, rgba(99,179,237,0.15), rgba(99,179,237,0.05));
      border: 1px solid rgba(99,179,237,0.3);
      border-radius: 8px;
      padding: 6px 12px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn-auto-fetch:active { transform: scale(0.95); background: rgba(99,179,237,0.2); }
    .btn-auto-fetch.loading { opacity: 0.6; pointer-events: none; }
    .fetch-status {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text3);
      margin-bottom: 8px;
      min-height: 16px;
      transition: color 0.3s;
    }
    .fetch-status.success { color: var(--accent3); }
    .fetch-status.error { color: var(--red); }
    .fetch-status.loading { color: var(--accent2); }

    /* 유틸 */
    .divider { height: 1px; background: var(--border); margin: 4px 20px; }
    .gap { height: 16px; }
  </style>
</head>
<body>

<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-top">
      <div class="logo">ETF · REPORT</div>
      <div class="live-badge">
        <div class="live-dot"></div>
        <span id="marketStatus">장 마감</span>
      </div>
    </div>
    <div class="header-time" id="clockTime">--:--:--</div>
    <div class="header-date" id="clockDate">Loading...</div>
  </div>

  <!-- 종가 입력 -->
  <div class="section">
    <div class="section-label-row">
      <div class="section-label">📊 ETF 현재가</div>
      <button class="btn-auto-fetch" id="fetchBtn" onclick="fetchAllPrices()">
        <span id="fetchBtnIcon">⚡</span> 자동수집
      </button>
    </div>
    <div class="fetch-status" id="fetchStatus"></div>
    <div class="price-grid" id="priceGrid">
      <!-- JS로 렌더링 -->
    </div>
  </div>

  <div class="divider"></div>

  <!-- 이란 시나리오 -->
  <div class="section">
    <div class="section-label">🌐 이란 시나리오 확률</div>
    <div class="scenario-grid">
      <div class="scenario-card">
        <div class="scenario-label">A · 종전</div>
        <div class="scenario-prob a" id="probA">15%</div>
        <input type="range" class="scenario-slider a" id="sliderA" min="0" max="100" value="15">
      </div>
      <div class="scenario-card">
        <div class="scenario-label">B · 교착</div>
        <div class="scenario-prob b" id="probB">38%</div>
        <input type="range" class="scenario-slider b" id="sliderB" min="0" max="100" value="38">
      </div>
      <div class="scenario-card">
        <div class="scenario-label">C · 확전</div>
        <div class="scenario-prob c" id="probC">47%</div>
        <input type="range" class="scenario-slider c" id="sliderC" min="0" max="100" value="47">
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 보고서 버튼 -->
  <div class="section">
    <div class="section-label">📋 보고서 생성</div>
  </div>
  <div class="btn-group">
    <button class="btn-report morning" onclick="generateReport('장전')">
      <span class="btn-icon">🌅</span>
      <span>장전 브리핑</span>
    </button>
    <button class="btn-report midday" onclick="generateReport('장중')">
      <span class="btn-icon">📈</span>
      <span>장중 보고서</span>
    </button>
    <button class="btn-report closing" onclick="generateReport('마감')">
      <span class="btn-icon">🌙</span>
      <span>마감 보고서</span>
    </button>
  </div>

  <div class="gap"></div>

  <!-- 로딩 -->
  <div class="section">
    <div class="loading-box" id="loadingBox">
      <div class="loading-spinner"></div>
      <div class="loading-text">보고서 생성 중...</div>
      <div class="loading-step" id="loadingStep">Claude API 연결 중</div>
    </div>
    <div class="error-box" id="errorBox"></div>
  </div>

  <!-- 보고서 출력 -->
  <div class="report-section" id="reportSection">
    <div class="report-header">
      <div class="report-title" id="reportTitle">보고서</div>
      <div class="report-actions">
        <button class="btn-action" onclick="copyReport()">복사</button>
        <button class="btn-action" onclick="sendEmail()">📧 메일</button>
      </div>
    </div>
    <div class="report-box" id="reportBox"></div>
  </div>

</div>

<!-- 하단 네비 -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="showTab('home')">
    <span class="nav-icon">📊</span>
    <span>보고서</span>
  </button>
  <button class="nav-btn" onclick="showTab('history')">
    <span class="nav-icon">📁</span>
    <span>히스토리</span>
  </button>
  <button class="nav-btn" onclick="showTab('settings')">
    <span class="nav-icon">⚙️</span>
    <span>설정</span>
  </button>
</div>

<!-- 설정 모달 -->
<div class="modal-overlay" id="settingsModal" onclick="closeSettings(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">⚙️ 설정</div>

    <div class="setting-row">
      <div class="setting-label">Claude API Key</div>
      <input class="setting-input" type="password" id="apiKeyInput" placeholder="sk-ant-...">
    </div>
    <div class="setting-row">
      <div class="setting-label">Gmail 주소</div>
      <input class="setting-input" type="email" id="gmailInput" placeholder="your@gmail.com">
    </div>
    <div class="setting-row">
      <div class="setting-label">Gmail 앱 비밀번호</div>
      <input class="setting-input" type="password" id="gmailPassInput" placeholder="xxxx xxxx xxxx xxxx">
      <div style="font-size:10px; color:var(--text3); margin-top:4px;">Google 계정 → 보안 → 앱 비밀번호에서 발급</div>
    </div>

    <button class="btn-save" onclick="saveSettings()">저장</button>
  </div>
</div>

<script>
// ============================================================
// 상태
// ============================================================
const ETF_LIST = [
  { id: 'sp500',    name: 'KODEX 미국S&P500',   avg: 22791, qty: 45,   code: '379800' },
  { id: 'nasdaq',   name: 'KODEX 미국나스닥100', avg: 24373, qty: 25,   code: '379810' },
  { id: 'semi',     name: 'TIGER 반도체TOP10',   avg: 30175, qty: 5,    code: '396500' },
  { id: 'defense',  name: 'KODEX 방산TOP10',     avg: 13326, qty: null, code: '455890' },
  { id: 'value',    name: 'ACE 코리아밸류업',    avg: 24938, qty: 25,   code: '496080' },
];

let currentReport = '';
let reportHistory = JSON.parse(localStorage.getItem('reportHistory') || '[]');

// ============================================================
// 초기화
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  renderPriceGrid();
  startClock();
  loadSettings();
  setupScenarioSliders();
});

// ============================================================
// 시계
// ============================================================
function startClock() {
  function update() {
    const now = new Date();
    const timeStr = now.toLocaleTimeString('ko-KR', { hour12: false });
    const dateStr = now.toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
    document.getElementById('clockTime').textContent = timeStr;
    document.getElementById('clockDate').textContent = dateStr;

    const h = now.getHours(), m = now.getMinutes();
    const isMarket = (h > 9 || (h === 9 && m >= 0)) && h < 15 || (h === 15 && m <= 30);
    const statusEl = document.getElementById('marketStatus');
    statusEl.textContent = isMarket ? '장중' : '장 마감';
    statusEl.style.color = isMarket ? 'var(--accent3)' : 'var(--text3)';
  }
  update();
  setInterval(update, 1000);
}

// ============================================================
// 종가 입력 카드 렌더링
// ============================================================
function renderPriceGrid() {
  const grid = document.getElementById('priceGrid');
  grid.innerHTML = ETF_LIST.map(etf => `
    <div class="price-card">
      <div class="price-card-left">
        <div class="price-name">${etf.name}</div>
        <div class="price-avg">평단 ${etf.avg.toLocaleString()}원${etf.qty ? ' · ' + etf.qty + '주' : ''}</div>
      </div>
      <div>
        <div class="price-input-wrap">
          <input class="price-input"
            type="number"
            id="price_${etf.id}"
            placeholder="종가"
            oninput="updatePnl('${etf.id}', ${etf.avg}, ${etf.qty})"
          >
          <span class="price-unit">원</span>
        </div>
        <div class="pnl-badge" id="pnl_${etf.id}"></div>
      </div>
    </div>
  `).join('');
}

function updatePnl(id, avg, qty) {
  const input = document.getElementById('price_' + id);
  const badge = document.getElementById('pnl_' + id);
  const price = parseFloat(input.value);
  if (!price || !qty) { badge.className = 'pnl-badge'; return; }
  const pct = ((price - avg) / avg * 100).toFixed(1);
  const sign = pct >= 0 ? '+' : '';
  badge.textContent = `${sign}${pct}%`;
  badge.className = 'pnl-badge ' + (pct >= 0 ? 'pos' : 'neg');
}

// ============================================================
// 시나리오 슬라이더
// ============================================================
function setupScenarioSliders() {
  ['A', 'B', 'C'].forEach(key => {
    document.getElementById('slider' + key).addEventListener('input', () => {
      const a = parseInt(document.getElementById('sliderA').value);
      const b = parseInt(document.getElementById('sliderB').value);
      const c = parseInt(document.getElementById('sliderC').value);
      document.getElementById('probA').textContent = a + '%';
      document.getElementById('probB').textContent = b + '%';
      document.getElementById('probC').textContent = c + '%';
    });
  });
}

function getScenarioProbs() {
  return {
    a: document.getElementById('sliderA').value,
    b: document.getElementById('sliderB').value,
    c: document.getElementById('sliderC').value,
  };
}

// ============================================================
// 현재가 수집
// ============================================================
function getPrices() {
  const prices = {};
  ETF_LIST.forEach(etf => {
    const val = document.getElementById('price_' + etf.id).value;
    prices[etf.id] = val ? parseInt(val) : null;
  });
  return prices;
}

function buildPriceText(prices) {
  return ETF_LIST.map(etf => {
    const p = prices[etf.id];
    const pnl = p ? `(${p > etf.avg ? '+' : ''}${((p - etf.avg)/etf.avg*100).toFixed(1)}%)` : '미입력';
    return `- ${etf.name}: ${p ? p.toLocaleString() + '원 ' + pnl : '미입력'} / 평단 ${etf.avg.toLocaleString()}원`;
  }).join('\n');
}

// ============================================================
// 보고서 생성
// ============================================================
async function generateReport(type) {
  const apiKey = localStorage.getItem('claudeApiKey');
  if (!apiKey) {
    showError('API Key가 설정되지 않았습니다. 설정(⚙️)에서 입력해주세요.');
    return;
  }

  const prices = getPrices();
  const priceText = buildPriceText(prices);
  const sc = getScenarioProbs();
  const now = new Date().toLocaleString('ko-KR');

  showLoading(true, 'Claude API 연결 중...');
  hideReport();
  hideError();

  const prompt = buildPrompt(type, priceText, sc, now);

  try {
    setLoadingStep('보고서 생성 중...');
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const reportText = data.content[0].text;
    currentReport = reportText;

    // 히스토리 저장
    reportHistory.unshift({ type, time: now, content: reportText });
    if (reportHistory.length > 20) reportHistory.pop();
    localStorage.setItem('reportHistory', JSON.stringify(reportHistory));

    showLoading(false);
    showReport(type, reportText);

  } catch (err) {
    showLoading(false);
    showError('오류: ' + err.message);
  }
}

⑦ 모의투자 A(보유종목 50만원), B(비보유종목 50만원) — 수량·단가 명시
⑧ 오늘 타임스케줄`,

${portfolio}

// ============================================================
// Yahoo Finance 종가 자동수집
// ============================================================
const YAHOO_CODES = {
  sp500:   '379800.KS',
  nasdaq:  '379810.KS',
  semi:    '396500.KS',
  defense: '455890.KS',
  value:   '496080.KS',  // ACE 코리아밸류업 정정
};

// CORS 프록시 목록 (하나 실패 시 다음으로 자동 전환)
const CORS_PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
  'https://cors-anywhere.herokuapp.com/',
  'https://thingproxy.freeboard.io/fetch/',
];

async function fetchAllPrices() {
  const btn = document.getElementById('fetchBtn');
  const icon = document.getElementById('fetchBtnIcon');
  const status = document.getElementById('fetchStatus');

  btn.classList.add('loading');
  icon.textContent = '⏳';
  setFetchStatus('loading', '종가 수집 중...');

  let successCount = 0;
  const errors = [];

  for (const etf of ETF_LIST) {
    const yahooCode = YAHOO_CODES[etf.id];
    try {
      const price = await fetchYahooPrice(yahooCode);
      if (price) {
        const input = document.getElementById('price_' + etf.id);
        input.value = price;
        updatePnl(etf.id, etf.avg, etf.qty);
        successCount++;
        setFetchStatus('loading', `${successCount}/${ETF_LIST.length} 수집 완료...`);
      }
    } catch (e) {
      errors.push(etf.name);
    }
    // 요청 간격 (API 과부하 방지)
    await sleep(300);
  }

  btn.classList.remove('loading');
  icon.textContent = '⚡';

  if (successCount === ETF_LIST.length) {
    setFetchStatus('success', `✅ 전체 ${successCount}개 종가 수집 완료 (15분 지연)`);
  } else if (successCount > 0) {
    setFetchStatus('success', `✅ ${successCount}개 수집 완료 / ❌ 실패: ${errors.join(', ')}`);
  } else {
    setFetchStatus('error', '❌ 수집 실패 — 수동 입력해주세요');
  }
}

async function fetchYahooPrice(code) {
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${code}?interval=1d&range=1d`;

  for (const proxy of CORS_PROXIES) {
    try {
      const res = await fetch(proxy + encodeURIComponent(url), {
        headers: { 'Accept': 'application/json' }
      });
      if (!res.ok) continue;
      const data = await res.json();
      const result = data?.chart?.result?.[0];
      if (!result) continue;

      // 장중이면 현재가, 마감이면 종가
      const meta = result.meta;
      const price = meta.regularMarketPrice || meta.previousClose;
      if (price && price > 0) return Math.round(price);
    } catch (e) {
      continue;
    }
  }
  throw new Error('fetch failed: ' + code);
}

function setFetchStatus(type, msg) {
  const el = document.getElementById('fetchStatus');
  el.textContent = msg;
  el.className = 'fetch-status ' + type;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}


function copyReport() {
  navigator.clipboard.writeText(currentReport).then(() => {
    alert('클립보드에 복사됐습니다.');
  });
}

function sendEmail() {
  const gmail = localStorage.getItem('gmailAddress');
  if (!gmail) { alert('설정에서 Gmail 주소를 먼저 입력해주세요.'); return; }
  const subject = encodeURIComponent(document.getElementById('reportTitle').textContent);
  const body = encodeURIComponent(currentReport.substring(0, 2000));
  window.open(`mailto:${gmail}?subject=${subject}&body=${body}`);
}

  document.getElementById('reportSection').className = 'report-section visible';
